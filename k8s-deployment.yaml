apiVersion: v1
kind: Namespace
metadata:
  name: mcp-fortios
  labels:
    name: mcp-fortios
    app: mcp-fortios-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-fortios-server
  labels:
    app: mcp-fortios-server
  namespace: mcp-fortios
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-fortios-server
  template:
    metadata:
      labels:
        app: mcp-fortios-server
    spec:
      containers:
      - name: mcp-fortios-server
        image: jviguerasfortinet/mcp-fortios-server:1.0.7
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
      volumes:
      - name: tmp-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-fortios-service
  namespace: mcp-fortios
  labels:
    app: mcp-fortios-server
spec:
  selector:
    app: mcp-fortios-server
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
